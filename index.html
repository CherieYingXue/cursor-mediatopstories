<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>普通动物学 · 知识卡片</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #2dd4bf;
      --accent-dim: #0d9488;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(12px);
      padding: 12px 16px 8px;
      border-bottom: 1px solid #334155;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    header p {
      margin: 4px 0 0;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .chapters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 16px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .chapters::-webkit-scrollbar { display: none; }
    .ch-btn {
      flex: 0 0 auto;
      border: 1px solid #334155;
      background: var(--card);
      color: var(--muted);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .ch-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
    }
    .deck {
      padding: 8px 16px calc(88px + var(--safe-bottom));
    }
    .card {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      min-height: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }
    .card .sec-id {
      display: inline-block;
      font-size: 0.7rem;
      color: var(--accent);
      background: rgba(45, 212, 191, 0.12);
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      line-height: 1.4;
    }
    .card ul {
      margin: 0;
      padding-left: 1.1em;
    }
    .card li {
      margin-bottom: 10px;
      font-size: 0.92rem;
      line-height: 1.55;
      color: #cbd5e1;
    }
    .card li::marker { color: var(--accent-dim); }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 16px;
    }
    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px calc(12px + var(--safe-bottom));
      background: rgba(15, 23, 42, 0.95);
      border-top: 1px solid #334155;
      gap: 12px;
    }
    nav.bottom button {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--card);
      color: var(--text);
    }
    nav.bottom button.primary {
      background: var(--accent-dim);
      color: #fff;
    }
    nav.bottom button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .progress {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      min-width: 72px;
    }
    .flip-hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>普通动物学（第4版）</h1>
    <p>刘凌云 · 郑光美 · 知识卡片</p>
  </header>
  <nav class="chapters" id="chapterNav" aria-label="章节"></nav>
  <main class="deck" id="deck">
    <p class="empty">加载中…</p>
  </main>
  <p class="flip-hint">左右滑动卡片，或使用底部按钮切换</p>
  <nav class="bottom" aria-label="翻页">
    <button type="button" id="prevBtn" aria-label="上一张">上一张</button>
    <span class="progress" id="progress">—</span>
    <button type="button" id="nextBtn" class="primary" aria-label="下一张">下一张</button>
  </nav>
  <script>
    const deckEl = document.getElementById("deck");
    const navEl = document.getElementById("chapterNav");
    const progressEl = document.getElementById("progress");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let data = [];
    let flatCards = [];
    let index = 0;
    let touchStartX = 0;

    function buildFlatCards(chapters) {
      const out = [];
      for (const ch of chapters) {
        for (const sec of ch.sections || []) {
          out.push({
            chapter: ch.chapter,
            chapterTitle: ch.title,
            ...sec,
          });
        }
      }
      return out;
    }

    function renderCard() {
      if (!flatCards.length) {
        deckEl.innerHTML = '<p class="empty">暂无卡片数据</p>';
        return;
      }
      const c = flatCards[index];
      deckEl.innerHTML = `
        <article class="card" data-index="${index}">
          <span class="sec-id">${c.chapterTitle} · ${c.id}</span>
          <h2>${c.title}</h2>
          <ul>${(c.points || []).map(p => `<li>${p}</li>`).join("")}</ul>
        </article>`;
      progressEl.textContent = `${index + 1} / ${flatCards.length}`;
      prevBtn.disabled = index <= 0;
      nextBtn.disabled = index >= flatCards.length - 1;
      document.querySelectorAll(".ch-btn").forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.ch) === c.chapter);
      });
    }

    function go(delta) {
      const next = index + delta;
      if (next < 0 || next >= flatCards.length) return;
      index = next;
      renderCard();
    }

    function jumpToChapter(ch) {
      const i = flatCards.findIndex(c => c.chapter === ch);
      if (i >= 0) {
        index = i;
        renderCard();
      }
    }

    function buildChapterNav() {
      navEl.innerHTML = data
        .map(ch => `<button type="button" class="ch-btn" data-ch="${ch.chapter}">第${ch.chapter}章</button>`)
        .join("");
      navEl.querySelectorAll(".ch-btn").forEach(btn => {
        btn.addEventListener("click", () => jumpToChapter(Number(btn.dataset.ch)));
      });
    }

    prevBtn.addEventListener("click", () => go(-1));
    nextBtn.addEventListener("click", () => go(1));

    deckEl.addEventListener("touchstart", e => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    deckEl.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(dx) < 50) return;
      go(dx < 0 ? 1 : -1);
    }, { passive: true });

    fetch("/static/zoology_cards_data.json")
      .then(r => r.json())
      .then(json => {
        data = json;
        flatCards = buildFlatCards(data);
        buildChapterNav();
        renderCard();
      })
      .catch(() => {
        deckEl.innerHTML = '<p class="empty">无法加载数据，请确认与 HTML 同目录存在 zoology_cards_data.json</p>';
      });
  </script>
</body>
</html>
