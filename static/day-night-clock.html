<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>昼夜 24 小时表</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --day: #9ed4fa;
      --night: #3a3f4a;
      --ring: #e8eef4;
      --text: #f0f4f8;
      --muted: #94a3b8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      touch-action: manipulation;
    }
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: calc(12px + var(--safe-top)) 12px calc(16px + var(--safe-bottom));
    }
    .digital {
      text-align: center;
      margin-bottom: 8px;
      user-select: none;
    }
    .digital .time {
      font-size: clamp(2rem, 9vw, 2.75rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
    }
    .digital .date {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .clock-wrap {
      width: min(92vw, 92vh, 420px);
      aspect-ratio: 1;
      position: relative;
    }
    .clock-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.35));
    }
    .meta {
      margin-top: 14px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      max-width: 340px;
      user-select: none;
    }
    .meta strong { font-weight: 600; }
    .meta .sun-line strong { color: #fbbf24; }
    .meta .moon-line strong { color: #c4b5fd; }
    .loc-btn {
      margin-top: 10px;
      border: 1px solid #475569;
      background: rgba(30, 41, 59, 0.8);
      color: var(--text);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .loc-btn:active { background: #334155; }
  </style>
</head>
<body>
  <div class="app">
    <div class="digital">
      <div class="time" id="timeText">--:--:--</div>
      <div class="date" id="dateText"></div>
    </div>

    <div class="clock-wrap">
      <svg viewBox="0 0 400 400" aria-label="24小时昼夜表盘">
        <defs>
          <clipPath id="dialClip">
            <circle cx="200" cy="200" r="188"/>
          </clipPath>
          <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <g id="symSun" filter="url(#glow)">
            <circle r="16" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
            <g stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round">
              <line y1="-22" y2="-28"/><line y1="22" y2="28"/>
              <line x1="-22" x2="-28"/><line x1="22" x2="28"/>
              <line x1="-16" y1="-16" x2="-20" y2="-20"/>
              <line x1="16" y1="16" x2="20" y2="20"/>
              <line x1="16" y1="-16" x2="20" y2="-20"/>
              <line x1="-16" y1="16" x2="-20" y2="20"/>
            </g>
          </g>
          <g id="symMoon" filter="url(#glow)">
            <circle r="16" fill="#c4b5fd" stroke="#8b5cf6" stroke-width="2"/>
            <circle cx="7" cy="-3" r="12" fill="#1a1a2e"/>
          </g>
        </defs>

        <!-- 昼夜：交界线（日出—日落）上方浅蓝=白天，下方深灰=黑夜 -->
        <g clip-path="url(#dialClip)">
          <circle cx="200" cy="200" r="188" fill="var(--night)"/>
          <path id="faceDay" fill="var(--day)"/>
          <path id="faceNight" fill="var(--night)"/>
          <path id="horizonRidge" fill="none" stroke="rgba(30,41,59,0.55)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <circle cx="200" cy="200" r="188" fill="none" stroke="var(--ring)" stroke-width="3" opacity="0.9"/>

        <g id="ticks"></g>
        <g id="eventLabels"></g>

        <!-- 太阳或月亮：沿刻度环移动，无指针 -->
        <g id="marker"></g>
      </svg>
    </div>

    <div class="meta">
      <div class="sun-line">☀ 日出 <strong id="sunriseText">--:--</strong></div>
      <div class="moon-line">☽ 日落 <strong id="sunsetText">--:--</strong></div>
      <div id="locText">定位中…</div>
    </div>
    <button type="button" class="loc-btn" id="locBtn">使用当前位置计算日出日落</button>
  </div>

  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script>
(function () {
  const CX = 200, CY = 200, R = 188;
  const TICK_OUTER = 172, TICK_INNER = 162, LABEL_R = 148, MARKER_R = 156;

  const timeText = document.getElementById("timeText");
  const dateText = document.getElementById("dateText");
  const sunriseText = document.getElementById("sunriseText");
  const sunsetText = document.getElementById("sunsetText");
  const locText = document.getElementById("locText");
  const locBtn = document.getElementById("locBtn");
  const ticksG = document.getElementById("ticks");
  const eventLabelsG = document.getElementById("eventLabels");
  const markerG = document.getElementById("marker");
  const faceDay = document.getElementById("faceDay");
  const faceNight = document.getElementById("faceNight");
  const horizonRidge = document.getElementById("horizonRidge");

  const NS = "http://www.w3.org/2000/svg";
  let lat = 39.9042;
  let lng = 116.4074;
  let locLabel = "北京（默认）";
  const WEEK = ["日", "一", "二", "三", "四", "五", "六"];

  function pad(n) { return String(n).padStart(2, "0"); }

  /**
   * 24 小时刻度方位（顺时针）：
   * 0 点正下方，6 点左侧，12 点正上方，18 点右侧。
   * 角度 = 从正下方起算的顺时针度数。
   */
  function minutesToAngle(min) {
    return (min / 1440) * 360;
  }

  function angleToXY(deg, radius) {
    const rad = (deg * Math.PI) / 180;
    return {
      x: CX - radius * Math.sin(rad),
      y: CY + radius * Math.cos(rad),
    };
  }

  function minutesOfDay(d) {
    return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60 + d.getMilliseconds() / 60000;
  }

  function formatHM(d) {
    return pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  function getSunTimes(date) {
    const t = SunCalc.getTimes(date, lat, lng);
    return { sunrise: t.sunrise, sunset: t.sunset };
  }

  /**
   * 日出—日落连线为起伏天际线（端点在表盘对应时刻）。
   * 屏幕坐标：交界线上方(y更小)=浅蓝白天；下方=深灰黑夜。
   */
  function buildSkylinePaths(sunrise, sunset) {
    const riseDeg = minutesToAngle(minutesOfDay(sunrise));
    const setDeg = minutesToAngle(minutesOfDay(sunset));
    const daySweep = (setDeg - riseDeg + 360) % 360;
    const nightSweep = (360 - daySweep) % 360;

    const S = angleToXY(riseDeg, R);
    const E = angleToXY(setDeg, R);
    const steps = 72;
    const ridgePts = [];

    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const deg = (riseDeg + daySweep * t) % 360;
      const wave =
        6 * Math.sin(t * Math.PI * 3.2) +
        3.5 * Math.sin(t * Math.PI * 7.4 + 0.7) +
        2 * Math.sin(t * Math.PI * 12.5 + 1.4);
      ridgePts.push(angleToXY(deg, Math.max(R - wave, R * 0.58)));
    }
    ridgePts[0] = S;
    ridgePts[steps] = E;

    let ridge = "M " + S.x.toFixed(2) + " " + S.y.toFixed(2);
    for (let i = 1; i < ridgePts.length; i++) {
      ridge += " L " + ridgePts[i].x.toFixed(2) + " " + ridgePts[i].y.toFixed(2);
    }

    const topArcLarge = daySweep > 180 ? 1 : 0;
    const bottomArcLarge = nightSweep > 180 ? 1 : 0;

    // 白天：天际线 → 沿表盘昼弧(经12点)回到日出
    const dayPath =
      ridge +
      " A " + R + " " + R + " 0 " + topArcLarge + ",0 " +
      S.x.toFixed(2) + " " + S.y.toFixed(2) + " Z";

    // 黑夜：日出 → 沿表盘夜弧(经0点)到日落 → 沿天际线返回
    let nightPath = "M " + S.x.toFixed(2) + " " + S.y.toFixed(2);
    nightPath +=
      " A " + R + " " + R + " 0 " + bottomArcLarge + ",1 " +
      E.x.toFixed(2) + " " + E.y.toFixed(2);
    for (let i = ridgePts.length - 1; i >= 0; i--) {
      nightPath += " L " + ridgePts[i].x.toFixed(2) + " " + ridgePts[i].y.toFixed(2);
    }
    nightPath += " Z";

    return { dayPath, nightPath, ridge, S, E };
  }

  function buildSkyFace(sunrise, sunset) {
    const p = buildSkylinePaths(sunrise, sunset);
    faceDay.setAttribute("d", p.dayPath);
    faceNight.setAttribute("d", p.nightPath);
    horizonRidge.setAttribute("d", p.ridge);
    return p;
  }

  function buildTicks() {
    ticksG.innerHTML = "";
    for (let h = 0; h < 24; h++) {
      const deg = minutesToAngle(h * 60);
      const p1 = angleToXY(deg, TICK_OUTER);
      const p2 = angleToXY(deg, TICK_INNER);
      const major = h % 6 === 0;
      const line = document.createElementNS(NS, "line");
      line.setAttribute("x1", p1.x);
      line.setAttribute("y1", p1.y);
      line.setAttribute("x2", p2.x);
      line.setAttribute("y2", p2.y);
      line.setAttribute("stroke", major ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.5)");
      line.setAttribute("stroke-width", major ? "2.5" : "1.2");
      line.setAttribute("stroke-linecap", "round");
      ticksG.appendChild(line);

      const lbl = angleToXY(deg, LABEL_R);
      const text = document.createElementNS(NS, "text");
      text.setAttribute("x", lbl.x);
      text.setAttribute("y", lbl.y + 4);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("fill", major ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.65)");
      text.setAttribute("font-size", major ? "11" : "9");
      text.setAttribute("font-weight", major ? "600" : "400");
      text.textContent = String(h);
      ticksG.appendChild(text);
    }
  }

  function placeHorizonLabel(text, x, y, color) {
    const t = document.createElementNS(NS, "text");
    t.setAttribute("x", x);
    t.setAttribute("y", y);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("fill", color);
    t.setAttribute("font-size", "9");
    t.setAttribute("font-weight", "600");
    t.setAttribute("opacity", "0.85");
    t.textContent = text;
    eventLabelsG.appendChild(t);
  }

  function placeEventLabel(text, time, color) {
    const deg = minutesToAngle(minutesOfDay(time));
    const p = angleToXY(deg, LABEL_R - 22);
    const t = document.createElementNS(NS, "text");
    t.setAttribute("x", p.x);
    t.setAttribute("y", p.y + 3);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("fill", color);
    t.setAttribute("font-size", "10");
    t.setAttribute("font-weight", "600");
    t.textContent = text;
    eventLabelsG.appendChild(t);
  }

  function isDaytime(now, sunrise, sunset) {
    const m = minutesOfDay(now);
    const riseM = minutesOfDay(sunrise);
    const setM = minutesOfDay(sunset);
    return m >= riseM && m < setM;
  }

  function setMarker(now, sunrise, sunset) {
    const deg = minutesToAngle(minutesOfDay(now));
    const pos = angleToXY(deg, MARKER_R);
    const day = isDaytime(now, sunrise, sunset);
    markerG.innerHTML = "";
    const g = document.createElementNS(NS, "g");
    g.setAttribute("transform", "translate(" + pos.x + "," + pos.y + ")");
    const use = document.createElementNS(NS, "use");
    use.setAttribute("href", day ? "#symSun" : "#symMoon");
    g.appendChild(use);
    markerG.appendChild(g);
  }

  function tick() {
    const now = new Date();
    const { sunrise, sunset } = getSunTimes(now);

    timeText.textContent =
      pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
    dateText.textContent =
      now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日 星期" + WEEK[now.getDay()];

    sunriseText.textContent = formatHM(sunrise);
    sunsetText.textContent = formatHM(sunset);

    const sky = buildSkyFace(sunrise, sunset);
    eventLabelsG.innerHTML = "";
    placeHorizonLabel("日出", sky.S.x, sky.S.y - 16, "#fef3c7");
    placeHorizonLabel("日落", sky.E.x, sky.E.y - 16, "#fde68a");

    setMarker(now, sunrise, sunset);
    locText.textContent = locLabel;
  }

  function requestLocation() {
    if (!navigator.geolocation) {
      locText.textContent = locLabel + "（设备不支持定位，使用默认坐标）";
      return;
    }
    locBtn.disabled = true;
    locBtn.textContent = "定位中…";
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        lat = pos.coords.latitude;
        lng = pos.coords.longitude;
        locLabel = "纬度 " + lat.toFixed(2) + "° · 经度 " + lng.toFixed(2) + "°";
        locBtn.disabled = false;
        locBtn.textContent = "使用当前位置计算日出日落";
        tick();
      },
      function () {
        locBtn.disabled = false;
        locBtn.textContent = "使用当前位置计算日出日落";
        locText.textContent = locLabel + "（定位失败，仍用默认坐标）";
      },
      { enableHighAccuracy: false, timeout: 12000, maximumAge: 300000 }
    );
  }

  buildTicks();
  locBtn.addEventListener("click", requestLocation);
  requestLocation();
  tick();
  setInterval(tick, 200);
})();
  </script>
</body>
</html>
