name: Deploy Knowledge Cards (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "static/zoology-cards.html"
      - "static/zoology_cards_data.json"
      - ".github/workflows/deploy-cards.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p public
          cp static/zoology-cards.html public/index.html
          cp static/zoology_cards_data.json public/zoology_cards_data.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
