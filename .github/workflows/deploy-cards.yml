name: Deploy Knowledge Cards (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "static/zoology-cards.html"
      - "static/zoology_cards_data.json"
      - ".github/workflows/deploy-cards.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p public
          cp static/zoology-cards.html public/index.html
          cp static/zoology_cards_data.json public/zoology_cards_data.json

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
