name: Deploy Static Pages (gh-pages)

on:
  push:
    branches: [main]
    paths:
      - "static/**"
      - ".github/workflows/deploy-static-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p public/derivative-gaokao
          cp static/zoology-cards.html public/index.html
          cp static/zoology_cards_data.json public/zoology_cards_data.json
          cp static/derivative-gaokao-cards.html public/derivative-gaokao/index.html
          touch public/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
